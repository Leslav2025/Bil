<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Більярд Про + TON Wallet</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Головний інтерфейс */
        #ui {
            position: absolute; top: 12px; left: 12px; color: white;
            background: rgba(0,0,0,0.8); padding: 10px 14px; border-radius: 8px;
            font-size: 14px; line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4); z-index: 5;
        }
        
        /* Кнопка виводу в UI */
        #withdraw-btn {
            margin-top: 8px; background: #24a1de; color: white; border: none;
            padding: 5px 10px; font-weight: bold; border-radius: 5px; cursor: pointer;
            font-size: 12px; display: block; width: 100%; pointer-events: auto;
        }
        #withdraw-btn:disabled {
            background: #555; color: #aaa; cursor: not-allowed;
        }

        /* Вікно фінішу гри */
        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.95);
            padding: 30px; border-radius: 10px; text-align: center; font-size: 22px;
            z-index: 10; width: 80%; max-width: 280px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Меню виводу коштів */
        #withdraw-modal {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white; background: rgba(15,15,15,0.98);
            border: 2px solid #24a1de; padding: 25px; border-radius: 12px; text-align: center;
            z-index: 20; width: 80%; max-width: 290px; box-shadow: 0 0 25px rgba(36,161,222,0.3);
        }
        #withdraw-modal h3 { margin-top: 0; color: #24a1de; }
        
        #ton-connect-btn { margin: 10px auto; display: block; }
        
        #withdraw-amount {
            width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px;
            border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 16px;
        }
        .modal-btn {
            padding: 10px 20px; font-weight: bold; border-radius: 6px; border: none; margin: 5px; cursor: pointer;
        }
        .btn-confirm { background: #24a1de; color: white; }
        .btn-cancel { background: #ff3333; color: white; }

        .ua-coin { color: #ffd700; font-weight: bold; }
        .ton-address { font-size: 11px; color: #888; word-break: break-all; margin: 5px 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

<div id="ui">
    <b>Баланс:</b> <span id="balance" class="ua-coin">0 UA</span><br>
    <b>Очки:</b> <span id="score" style="color: #ff3333;">0</span> | 
    <b>Ударів:</b> <span id="clicks" style="color: #00ff55;">15</span><br>
    <small style="opacity: 0.7;">Чорна: +7 | Червона: +3 | Інші: +1</small>
    <button id="withdraw-btn" onclick="openWithdrawModal()">Вивід (мін. 1000)</button>
</div>

<div id="game-over">
    <h2>ГРУ ЗАКІНЧЕНО!</h2>
    <p>Ваш результат: <span id="final-score">0</span> очок</p>
    <p style="font-size: 18px; color: #ffd700;">Зароблено: +<span id="earned-ua">0</span> UA</p>
    <p style="font-size: 14px; color: #aaa; margin-top: 20px;">Торкніться столу для нової гри</p>
</div>

<div id="withdraw-modal">
    <h3>Вивід на Telegram Wallet</h3>
    <p style="font-size: 14px; color: #ccc;">Доступно: <span id="modal-available" class="ua-coin">0 UA</span></p>
    
    <div id="ton-connect-btn"></div>
    <div id="wallet-info" class="ton-address"></div>
    
    <input type="number" id="withdraw-amount" placeholder="Сума UA (мін. 1000)" min="1000">
    
    <div style="margin-top: 15px;">
        <button id="submit-withdraw" class="modal-btn btn-confirm" onclick="processWithdraw()" disabled>Надіслати заявку</button>
        <button class="modal-btn btn-cancel" onclick="closeWithdrawModal()">Скасувати</button>
    </div>
</div>

<script>
    let score = 0;
    let clicksLeft = 15;
    let gameOver = false;
    let isModalOpen = false;
    let userWalletAddress = null;
    
    let uaBalance = parseInt(localStorage.getItem('ua_billiards_balance')) || 0;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/Bil/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    tonConnectUI.onStatusChange(wallet => {
        const infoDiv = document.getElementById('wallet-info');
        const submitBtn = document.getElementById('submit-withdraw');
        
        if (wallet) {
            userWalletAddress = wallet.account.address;
            infoDiv.innerText = "Підключено: " + userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(userWalletAddress.length - 4);
            infoDiv.style.color = "#00ff55";
            submitBtn.removeAttribute('disabled');
        } else {
            userWalletAddress = null;
            infoDiv.innerText = "Гаманець не підключено";
            infoDiv.style.color = "#888";
            submitBtn.setAttribute('disabled', 'true');
        }
    });

    function updateBalanceUI() {
        document.getElementById('balance').innerText = uaBalance + " UA";
        const wBtn = document.getElementById('withdraw-btn');
        if (uaBalance >= 1000) {
            wBtn.removeAttribute('disabled');
            wBtn.innerText = "Вивести UA";
            wBtn.style.background = "#24a1de";
            wBtn.style.color = "white";
        } else {
            wBtn.setAttribute('disabled', 'true');
            wBtn.innerText = `До виводу: ${1000 - uaBalance} UA`;
            wBtn.style.background = "#555";
            wBtn.style.color = "#aaa";
        }
    }

    function openWithdrawModal() {
        if (uaBalance < 1000) return;
        isModalOpen = true;
        document.getElementById('modal-available').innerText = uaBalance + " UA";
        document.getElementById('withdraw-amount').value = uaBalance;
        document.getElementById('withdraw-modal').style.display = 'block';
    }

    function closeWithdrawModal() {
        isModalOpen = false;
        document.getElementById('withdraw-modal').style.display = 'none';
    }

    function processWithdraw() {
        if (!userWalletAddress) {
            alert("Спочатку підключіть ваш Telegram гаманець!");
            return;
        }

        const amount = parseInt(document.getElementById('withdraw-amount').value);

        if (isNaN(amount) || amount < 1000) {
            alert("Мінімальна сума для виводу становить 1000 UA!");
            return;
        }
        if (amount > uaBalance) {
            alert("Недостатньо монет на балансі!");
            return;
        }

        // Текст, який буде автоматично скопійовано для адміна
        const textToCopy = `Заявка на вивід монет UA\nСума: ${amount} UA\nАдреса гаманця: ${userWalletAddress}`;

        // Функція копіювання в буфер обміну
        navigator.clipboard.writeText(textToCopy).then(() => {
            // Списання з балансу гри після успішного копіювання
            uaBalance -= amount;
            localStorage.setItem('ua_billiards_balance', uaBalance);
            updateBalanceUI();
            closeWithdrawModal();

            // Показуємо фірмове сповіщення з переходом до вас
            if (confirm(`Заявку створено та автоматично скопійовано!\n\nНатисніть "ОК", щоб перейти в чат до @Leslav і просто вставити (Ctrl+V або затиснути екран) текст заявки.`)) {
                window.open('https://t.me/Leslav', '_blank');
            }
        }).catch(err => {
            alert("Сталася помилка при копіюванні. Спробуйте ще раз.");
        });
    }

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
    }

    function playHitSound(volume = 1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(volume * 0.4, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
    }

    function playPocketSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    // 1. Сцена, Камера, Рендерер
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121212);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 16, 3.5);
    camera.lookAt(0, -0.5, -1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 2. Світло
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(3, 15, 3);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // 3. Вертикальний стіл
    const tableGroup = new THREE.Group();
    const clothGeo = new THREE.BoxGeometry(5.6, 0.4, 11.2);
    const clothMat = new THREE.MeshStandardMaterial({ color: 0x0a6c36, roughness: 0.7 });
    const cloth = new THREE.Mesh(clothGeo, clothMat);
    cloth.position.y = -0.2;
    cloth.receiveShadow = true;
    tableGroup.add(cloth);

    const borderMat = new THREE.MeshStandardMaterial({ color: 0x5a2a00, roughness: 0.5 });
    const bShort1 = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.6, 0.3), borderMat);
    bShort1.position.set(0, 0.1, 5.75);
    const bShort2 = bShort1.clone(); bShort2.position.z = -5.75;
    
    const bLong1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 11.2), borderMat);
    bLong1.position.set(2.95, 0.1, 0);
    const bLong2 = bLong1.clone(); bLong2.position.x = -2.95;

    tableGroup.add(bShort1, bShort2, bLong1, bLong2);
    scene.add(tableGroup);

    // 4. Лузи
    const pockets = [
        { x: -2.55, z: -5.35 }, { x: 2.55, z: -5.35 },
        { x: -2.7, z: 0 },      { x: 2.7, z: 0 },
        { x: -2.55, z: 5.35 },  { x: 2.55, z: 5.35 }
    ];
    const pocketRadius = 0.34;
    const pocketGeo = new THREE.CylinderGeometry(pocketRadius, pocketRadius, 0.1, 24);
    const pocketMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

    pockets.forEach(p => {
        const pMesh = new THREE.Mesh(pocketGeo, pocketMat);
        pMesh.position.set(p.x, 0.02, p.z);
        scene.add(pMesh);
    });

    // 5. Кулі
    let balls = [];
    const ballRadius = 0.16;
    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);

    function createBall(x, z, color, pointsValue, isCue = false) {
        const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.1, metalness: 0.1 });
        const mesh = new THREE.Mesh(ballGeo, mat);
        mesh.position.set(x, ballRadius, z);
        mesh.castShadow = true;
        scene.add(mesh);
        
        balls.push({
            mesh: mesh,
            vel: { x: 0, z: 0 },
            isCue: isCue,
            radius: ballRadius,
            isFalling: false,
            points: pointsValue
        });
    }

    function initGameObjects() {
        balls.forEach(b => scene.remove(b.mesh));
        balls = [];

        createBall(0, 3.2, 0xffffff, -2, true);

        const startZ = -1.2;
        const ballSetup = [
            { c: 0xffd700, p: 1 },
            { c: 0x0000ff, p: 1 }, { c: 0xff0000, p: 3 },
            { c: 0xff0000, p: 3 }, { c: 0x111111, p: 7 }, { c: 0xff0000, p: 3 },
            { c: 0xffd700, p: 1 }, { c: 0x0000ff, p: 1 }, { c: 0xffd700, p: 1 }, { c: 0x0000ff, p: 1 },
            { c: 0xff0000, p: 3 }, { c: 0xff0000, p: 3 }, { c: 0xffd700, p: 1 }, { c: 0x0000ff, p: 1 }, { c: 0xff0000, p: 3 }
        ];

        let idx = 0;
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                const bx = (j - i / 2) * (ballRadius * 2.12);
                const bz = startZ - i * (ballRadius * 1.8);
                const setup = ballSetup[idx] || { c: 0xffffff, p: 1 };
                createBall(bx, bz, setup.c, setup.p);
                idx++;
            }
        }

        score = 0;
        clicksLeft = 15;
        gameOver = false;
        document.getElementById('score').innerText = score;
        document.getElementById('clicks').innerText = clicksLeft;
        updateBalanceUI();
        document.getElementById('game-over').style.display = 'none';
    }

    initGameObjects();

    const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xff3333 });
    const aimLine = new THREE.Line(lineGeo, lineMat);
    aimLine.visible = false;
    scene.add(aimLine);

    // 6. Керування
    let isDragging = false;
    let touchStart = { x: 0, y: 0 };
    let aimVector = { x: 0, z: 0 };

    window.addEventListener('touchstart', (e) => {
        if (isModalOpen) return; 

        initAudio();
        
        if (gameOver) {
            initGameObjects();
            return;
        }

        const whiteBall = balls.find(b => b.isCue);
        if (whiteBall && Math.abs(whiteBall.vel.x) < 0.01 && Math.abs(whiteBall.vel.z) < 0.01 && !whiteBall.isFalling) {
            isDragging = true;
            touchStart.x = e.touches[0].clientX;
            touchStart.y = e.touches[0].clientY;
        }
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging || gameOver || isModalOpen) return;
        
        const dx = e.touches[0].clientX - touchStart.x;
        const dy = e.touches[0].clientY - touchStart.y;
        
        aimVector.x = -dx * 0.035;
        aimVector.z = -dy * 0.035;

        const whiteBall = balls.find(b => b.isCue);
        if (whiteBall) {
            aimLine.visible = true;
            const p = whiteBall.mesh.position;
            const points = [
                new THREE.Vector3(p.x, p.y, p.z),
                new THREE.Vector3(p.x + aimVector.x * 3.5, p.y, p.z + aimVector.z * 3.5)
            ];
            aimLine.geometry.setFromPoints(points);
        }
    });

    window.addEventListener('touchend', () => {
        if (!isDragging || gameOver || isModalOpen) return;
        isDragging = false;
        aimLine.visible = false;

        const whiteBall = balls.find(b => b.isCue);
        if (whiteBall) {
            if (Math.abs(aimVector.x) > 0.04 || Math.abs(aimVector.z) > 0.04) {
                whiteBall.vel.x = aimVector.x * 0.23;
                whiteBall.vel.z = aimVector.z * 0.23;
                clicksLeft--;
                document.getElementById('clicks').innerText = clicksLeft;
                playHitSound(1.1);
            }
        }
    });

    // 7. Фізика
    function updatePhysics() {
        const friction = 0.984;

        for (let i = balls.length - 1; i >= 0; i--) {
            const b = balls[i];

            if (b.isFalling) {
                b.mesh.position.y -= 0.04;
                b.mesh.scale.multiplyScalar(0.88);
                
                if (b.mesh.position.y < -0.6) {
                    playPocketSound();
                    
                    if (b.isCue) {
                        score += b.points;
                        document.getElementById('score').innerText = score;
                        
                        b.mesh.position.set(0, ballRadius, 3.2);
                        b.mesh.scale.set(1, 1, 1);
                        b.vel.x = 0; b.vel.z = 0;
                        b.isFalling = false;
                    } else {
                        score += b.points;
                        document.getElementById('score').innerText = score;
                        scene.remove(b.mesh);
                        balls.splice(i, 1);
                    }
                }
                continue;
            }

            b.mesh.position.x += b.vel.x;
            b.mesh.position.z += b.vel.z;

            b.vel.x *= friction;
            b.vel.z *= friction;

            if (Math.abs(b.vel.x) < 0.001) b.vel.x = 0;
            if (Math.abs(b.vel.z) < 0.001) b.vel.z = 0;

            pockets.forEach(p => {
                const pdx = b.mesh.position.x - p.x;
                const pdz = b.mesh.position.z - p.z;
                if (Math.sqrt(pdx * pdx + pdz * pdz) < pocketRadius) {
                    b.isFalling = true;
                }
            });

            const limitX = 2.8 - b.radius;
            const limitZ = 5.6 - b.radius;
            let hitBorder = false;

            if (b.mesh.position.x > limitX) { b.mesh.position.x = limitX; b.vel.x *= -1; hitBorder = true; }
            if (b.mesh.position.x < -limitX) { b.mesh.position.x = -limitX; b.vel.x *= -1; hitBorder = true; }
            if (b.mesh.position.z > limitZ) { b.mesh.position.z = limitZ; b.vel.z *= -1; hitBorder = true; }
            if (b.mesh.position.z < -limitZ) { b.mesh.position.z = -limitZ; b.vel.z *= -1; hitBorder = true; }
            
            if (hitBorder && (Math.abs(b.vel.x) > 0.04 || Math.abs(b.vel.z) > 0.04)) {
                playHitSound(0.35);
            }
        }

        if (clicksLeft <= 0 && !gameOver) {
            let allStopped = balls.every(b => b.vel.x === 0 && b.vel.z === 0);
            if (allStopped) {
                gameOver = true;
                let uaEarned = score > 0 ? score : 0;
                uaBalance += uaEarned;
                localStorage.setItem('ua_billiards_balance', uaBalance);
                
                document.getElementById('final-score').innerText = score;
                document.getElementById('earned-ua').innerText = uaEarned;
                updateBalanceUI();
                document.getElementById('game-over').style.display = 'block';
            }
        }

        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                const b1 = balls[i]; const b2 = balls[j];
                if (b1.isFalling || b2.isFalling) continue;

                const dx = b2.mesh.position.x - b1.mesh.position.x;
                const dz = b2.mesh.position.z - b1.mesh.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                const minDist = b1.radius + b2.radius;

                if (dist < minDist) {
                    const nx = dx / dist; const nz = dz / dist;
                    const overlap = minDist - dist;
                    b1.mesh.position.x -= nx * overlap * 0.5;
                    b1.mesh.position.z -= nz * overlap * 0.5;
                    b2.mesh.position.x += nx * overlap * 0.5;
                    b2.mesh.position.z += nz * overlap * 0.5;

                    const kx = b1.vel.x - b2.vel.x;
                    const kz = b1.vel.z - b2.vel.z;
                    const p = nx * kx + nz * kz;

                    if (p > 0) {
                        b1.vel.x -= nx * p; b1.vel.z -= nz * p;
                        b2.vel.x += nx * p; b2.vel.z += nz * p;
                        
                        const speed = Math.sqrt(kx * kx + kz * kz);
                        if (speed > 0.015) playHitSound(Math.min(speed * 3.5, 1));
                    }
                }
            }
        }
    }

    // 8. Анімація
    function animate() {
        requestAnimationFrame(animate);
        updatePhysics();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
